name: Compile, Run Go Program and Push

on:
  schedule:
    - cron: "*/20 * * * *"  # 每 20 分钟运行一次
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3  # 检出仓库代码

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'  # 替换为你的 Go 版本

    - name: Initialize Go module
      run: |
        go mod tidy  # 清理并获取依赖

    - name: Build the Go program
      run: go build -o generate_geosite main.go  # 编译生成可执行文件

    - name: Run the Go program
      run: ./generate_geosite  # 运行生成的可执行文件

    - name: Check if the file exists
      run: |
        if [ ! -f "adblock_geosite.dat" ]; then
          echo "adblock_geosite.dat does not exist."
          exit 1
        fi

    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Actions"

    - name: Commit and Push changes
      run: |
        git add adblock_geosite.dat
        git commit -m "Add adblock_geosite.dat"
        git push https://x-access-token=${{ secrets.TOKEN }}@github.com/${{ github.repository }} HEAD:main
      env:
        TOKEN: ${{ secrets.TOKEN }}

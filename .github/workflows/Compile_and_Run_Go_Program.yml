name: Compile_and_Run_Go_Program

on:
  schedule:
    - cron: "*/20 * * * *"  # 每 20 分钟运行一次
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3  # 检出仓库代码

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'  # 替换为你的 Go 版本

    - name: Initialize Go module
      run: |
        go mod init mymodule  # 初始化 Go 模块
        go mod tidy  # 清理并获取依赖

    - name: Build the Go program
      run: go build -o generate_geosite main.go  # 编译生成可执行文件

    - name: Run the Go program
      run: ./generate_geosite  # 运行生成的可执行文件

    - name: Commit and push .dat file
      env:
        GITHUB_TOKEN: ${{ secrets.TOKEN }}
      run: |
        git config --global user.email "you@example.com"
        git config --global user.name "Your Name"

        # 只添加并提交 adblock_geosite.dat 文件
        git add adblock_geosite.dat

        # 如果有更改则提交，否则跳过
        git diff --cached --quiet || git commit -m "Update adblock_geosite.dat"

        # 强制推送到 main 分支
        git push --force https://x-access-token:${{ secrets.TOKEN }}@github.com/${{ github.repository }}.git HEAD:main

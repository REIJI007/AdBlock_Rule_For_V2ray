name: Run main.go and Push Generated File

on:
  push:
    branches:
      - main  # 可以根据需要修改为你的默认分支
  workflow_dispatch: # 允许手动触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'  # 根据你的 Go 版本调整

      - name: Run main.go
        run: go run main.go

      - name: Configure Git
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: Commit and Push changes
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: |
          git add adblock_geosite.dat
          git commit -m "Update adblock_geosite.dat from GitHub Action"
          git push --force-with-lease "https://${TOKEN}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref }}

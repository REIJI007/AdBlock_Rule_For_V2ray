name: Compile_and_Run_Go_Program
on:
  schedule:
    - cron: "*/20 * * * *"  # 每 20 分钟运行一次
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # 获取完整的 git 历史

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'  # 使用您需要的 Go 版本

    - name: Initialize Go module
      run: |
        go mod init github.com/${{ github.repository }}
        go mod tidy

    - name: Build and Run Go program
      run: |
        go build -o generate_geosite
        ./generate_geosite

    - name: Commit and push .dat file
      env:
        GITHUB_TOKEN: ${{ secrets.TOKEN }}
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        
        if [ -f adblock_geosite.dat ]; then
          git add adblock_geosite.dat generate_geosite go.mod go.sum
          git commit -m "Add generated files and Go module files"
          git push
        else
          echo "File adblock_geosite.dat does not exist. Skipping commit."
        fi

name: Run_Conversion

on:
  schedule:
    # 定时任务，每20分钟运行一次
    - cron: '*/20 * * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'  # 使用你需要的Go版本

    - name: Initialize Go module
      run: |
        go mod init your-module-name || echo "go.mod already exists"
        go get github.com/golang/protobuf/proto
        go get v2ray.com/core/app/router

    - name: Download dependencies
      run: go mod download

    - name: Run conversion script
      run: go run main.go

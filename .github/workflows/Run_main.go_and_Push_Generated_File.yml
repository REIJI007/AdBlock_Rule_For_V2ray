name: Run_main.go_and_Push_Generated_File

on:
  schedule:
    - cron: '*/20 * * * *'  # 每 20 分钟触发一次
  workflow_dispatch: # 允许手动触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'  # 根据你的 Go 版本调整

      - name: Set up Go Module
        run: |
          mkdir -p mymodule
          mv main.go mymodule/
          cd mymodule
          go mod init example.com/mymodule
          go get github.com/golang/protobuf/proto
          go get v2ray.com/core/app/router
          go mod tidy  # 确保所有依赖被正确下载

      - name: Run main.go
        run: |
          cd mymodule
          go run main.go

      - name: Move adblock_geosite.dat to root
        run: |
          mv mymodule/adblock_geosite.dat .  # 将文件移动到仓库根目录

      - name: Configure Git
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: Force Add and Commit file  # 强制添加并提交adblock_geosite.dat文件
        run: |
          git add -f adblock_geosite.dat  # 强制添加 adblock_geosite.dat 文件
          git commit -m 'Update adblock_geosite.dat' || echo "No changes to commit"

      - name: Push file  # 推送adblock_geosite.dat文件
        env:
          TOKEN: ${{ secrets.TOKEN }}  # 使用 GitHub 密钥进行身份验证
        run: |
          git push --force-with-lease "https://${TOKEN}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref }}

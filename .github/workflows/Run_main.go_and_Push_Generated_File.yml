name: Run_main.go_and_Push_Generated_File

on:
  schedule:
    - cron: '*/20 * * * *'  # 每 20 分钟触发一次
  workflow_dispatch: # 允许手动触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'  # 根据你的 Go 版本调整

      - name: Set up Go Module
        run: |
          mkdir -p mymodule
          mv main.go mymodule/
          cd mymodule
          go mod init example.com/mymodule
          go get github.com/golang/protobuf/proto
          go get v2ray.com/core/app/router

      - name: Run main.go
        run: |
          cd mymodule
          go run main.go
          if [ ! -f adblock_geosite.dat ]; then
            echo "Error: adblock_geosite.dat was not generated."
            exit 1
          fi

      - name: Configure Git
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: Commit and Push changes
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: |
          git add adblock_geosite.dat
          git commit -m "Update adblock_geosite.dat from GitHub Action"
          git push --force-with-lease "https://${TOKEN}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref }}

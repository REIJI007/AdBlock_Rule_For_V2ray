name: Run_main.go_and_Push_Generated_File

on:
  schedule:
    - cron: '*/20 * * * *'  # 每 20 分钟触发一次
  workflow_dispatch: # 允许手动触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'  # 根据你的 Go 版本调整

      - name: Set up Go Module
        run: |
          mkdir -p mymodule
          mv main.go mymodule/
          cd mymodule
          go mod init example.com/mymodule
          go get github.com/golang/protobuf/proto
          go get v2ray.com/core/app/router

      - name: Run main.go
        run: |
          cd mymodule
          go run main.go
          if [ ! -f adblock_geosite.dat ]; then
            echo "Error: adblock_geosite.dat was not generated."
            exit 1
          fi
          mv adblock_geosite.dat ../  # 移动文件到仓库根目录

      - name: Print working directory and list files  # 列出文件以确保路径正确
        run: |
          cd ..
          pwd
          ls -al

      - name: Configure Git
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: Force Add and Commit file  # 强制添加并提交 adblock_geosite.dat 文件
        run: |
          git add -f adblock_geosite.dat  # 添加文件到仓库根目录
          git commit -m 'Update adblock_geosite.dat' || git commit --allow-empty -m 'Empty commit to force push'  # 提交更改，若无更改则提交空更改

      - name: Retry Push file  # 推送 adblock_geosite.dat 文件，失败时重试
        env:
          TOKEN: ${{ secrets.TOKEN }}  # 使用 GitHub 密钥进行身份验证
        run: |
          for i in {1..5}; do  # 尝试最多 5 次
            git push --force-with-lease "https://${TOKEN}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref }} && exit 0 || (echo "Push failed, retrying in 10 seconds..." && sleep 10)
          done
